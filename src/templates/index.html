<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>법령 AI — 법률 정보 검색</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    window.__INITIAL_SESSION_ID__ = "{{ initial_session_id | default('') }}";
  </script>
  <style>
    .prose-chat h1, .prose-chat h2, .prose-chat h3 { font-weight: 600; margin-bottom: 0.25rem; }
    .prose-chat p { margin-bottom: 0.5rem; }
    .prose-chat ul, .prose-chat ol { padding-left: 1.25rem; margin-bottom: 0.5rem; }
    .prose-chat li { margin-bottom: 0.15rem; }
    .prose-chat strong { font-weight: 600; }
    .prose-chat p:last-child { margin-bottom: 0; }
    @keyframes bounce-dot {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .dot-bounce { animation: bounce-dot 1.2s infinite; }
    .dot-bounce:nth-child(2) { animation-delay: 0.2s; }
    .dot-bounce:nth-child(3) { animation-delay: 0.4s; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- 법률 면책 고지 -->
  <div class="bg-amber-50 border-b border-amber-200 px-4 py-2 flex-shrink-0">
    <div class="max-w-3xl mx-auto text-xs text-amber-800">
      <strong>⚠ 법률 정보 제공 서비스</strong> — 법령·판례 기반 <strong>정보 검색</strong>이며 법률 자문·상담이 아닙니다.
      구체적인 법적 판단·권리 행사는 반드시 변호사와 상담하세요.
      인용 조문은 <a href="https://www.law.go.kr" target="_blank" rel="noopener" class="underline">법제처</a>에서 원문을 확인하세요.
    </div>
  </div>

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-4 py-4 flex-shrink-0">
    <div class="max-w-3xl mx-auto flex items-center justify-between">
      <div>
        <div class="flex items-baseline gap-3">
          <h1 class="text-xl font-bold text-gray-900">법령 AI</h1>
          <span class="text-xs text-gray-400 hidden sm:inline">법령·판례·법령해석례 기반 법률 정보</span>
        </div>
        <div class="text-xs text-gray-400 mt-0.5">
          {{ ollama_model }} · Mac Mini M2 로컬 추론
        </div>
      </div>
      <button id="new-chat-btn"
              class="text-xs px-3 py-1.5 rounded-lg border border-gray-200 text-gray-600
                     hover:bg-gray-50 hover:border-gray-300 transition-colors">
        새 상담
      </button>
    </div>
  </header>

  <!-- Chat messages area -->
  <main class="flex-1 overflow-y-auto px-4 py-6" id="chat-scroll">
    <div class="max-w-3xl mx-auto space-y-2" id="chat-messages">

      <!-- Onboarding cards (hidden once first message sent) -->
      <div id="onboarding" class="space-y-4">
        <div class="text-center py-6">
          <div class="text-2xl font-bold text-gray-800 mb-1">무엇이 궁금하신가요?</div>
          <div class="text-sm text-gray-500">법령·판례 기반으로 법률 정보를 알려드립니다</div>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all"
                  data-question="부당해고를 당했을 때 어떻게 해야 하나요?">
            <div class="text-lg mb-1">🏭</div>
            <div class="font-semibold text-sm text-gray-800">노동법</div>
            <div class="text-xs text-gray-500 mt-0.5">부당해고·임금체불·퇴직금</div>
          </button>
          <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all"
                  data-question="이혼 절차와 재산분할은 어떻게 되나요?">
            <div class="text-lg mb-1">👨‍👩‍👧</div>
            <div class="font-semibold text-sm text-gray-800">가족/연인</div>
            <div class="text-xs text-gray-500 mt-0.5">이혼·양육권·재산분할</div>
          </button>
          <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all"
                  data-question="폭행 피해를 입었을 때 고소 방법과 절차는?">
            <div class="text-lg mb-1">👊</div>
            <div class="font-semibold text-sm text-gray-800">폭행</div>
            <div class="text-xs text-gray-500 mt-0.5">고소·정당방위·합의</div>
          </button>
          <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all"
                  data-question="전세 보증금을 돌려받지 못할 때 법적 조치는?">
            <div class="text-lg mb-1">🏠</div>
            <div class="font-semibold text-sm text-gray-800">부동산</div>
            <div class="text-xs text-gray-500 mt-0.5">임대차·보증금·계약분쟁</div>
          </button>
          <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all"
                  data-question="빌려준 돈을 돌려받기 위한 법적 방법은?">
            <div class="text-lg mb-1">💰</div>
            <div class="font-semibold text-sm text-gray-800">채권/사기</div>
            <div class="text-xs text-gray-500 mt-0.5">빌려준 돈·계약위반·사기</div>
          </button>
          <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all"
                  data-question="교통사고 과실비율은 어떻게 결정되나요?">
            <div class="text-lg mb-1">🚗</div>
            <div class="font-semibold text-sm text-gray-800">교통사고</div>
            <div class="text-xs text-gray-500 mt-0.5">과실비율·합의·보험</div>
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- Input bar (sticky bottom) -->
  <div class="bg-white border-t border-gray-200 px-4 py-3 flex-shrink-0">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="flex gap-2 items-end">
        <textarea id="question-input"
                  name="question"
                  rows="1"
                  placeholder="법률 질문을 입력하세요…"
                  class="flex-1 text-sm border border-gray-200 rounded-xl px-3 py-2.5
                         focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-blue-300
                         resize-none overflow-hidden leading-relaxed"
                  style="min-height: 42px; max-height: 140px;"></textarea>
        <button type="submit" id="send-btn"
                class="px-4 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-xl
                       hover:bg-blue-700 active:bg-blue-800 transition-colors flex-shrink-0 self-end">
          전송
        </button>
      </form>
      <div class="text-xs text-gray-400 mt-1.5 text-center">
        로컬 AI 추론 특성상 <strong class="text-gray-500">15~30초</strong> 소요됩니다
      </div>
    </div>
  </div>

  <script>
  (function () {
    const SESSION_KEY = 'rag_law_session_id';
    let sessionId = localStorage.getItem(SESSION_KEY);
    let streaming = false;
    let sessionInitialized = false;

    marked.setOptions({ breaks: true });

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function userBubbleHtml(text) {
      return `<div class="flex justify-end mb-3">
        <div class="max-w-[80%] bg-blue-600 text-white rounded-2xl rounded-tr-sm px-4 py-2.5 text-sm">${escapeHtml(text)}</div>
      </div>`;
    }

    function typingBubbleHtml(id) {
      return `<div id="${id}" class="flex justify-start mb-4">
        <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
          <div class="flex gap-1.5 items-center h-5">
            <div class="w-2 h-2 bg-gray-400 rounded-full dot-bounce"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full dot-bounce"></div>
            <div class="w-2 h-2 bg-gray-400 rounded-full dot-bounce"></div>
          </div>
        </div>
      </div>`;
    }

    function aiBubbleHtml(text, docs, latency) {
      const mdHtml = marked.parse(text);
      let chips = '';
      if (docs && docs.length) {
        chips = '<div class="flex flex-wrap gap-1 mt-2">';
        docs.slice(0, 5).forEach(d => {
          if (d.source === 'law')
            chips += `<span class="text-xs px-2 py-0.5 bg-blue-50 text-blue-700 border border-blue-200 rounded-full">⚖ ${escapeHtml((d.law_name||'').slice(0,20))}</span>`;
          else if (d.source === 'prec')
            chips += `<span class="text-xs px-2 py-0.5 bg-orange-50 text-orange-700 border border-orange-200 rounded-full">⚖ ${escapeHtml((d.article_num||'').slice(0,20))}</span>`;
          else if (d.source === 'expc')
            chips += `<span class="text-xs px-2 py-0.5 bg-purple-50 text-purple-700 border border-purple-200 rounded-full">📋 ${escapeHtml((d.law_name||'').slice(0,20))}</span>`;
        });
        chips += '</div>';
      }
      const latencyHtml = latency != null ? `<div class="text-xs text-gray-400 mt-1">${latency}초 소요</div>` : '';
      return `<div class="flex justify-start mb-4">
        <div class="max-w-[85%] space-y-1">
          <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
            <div class="prose-chat text-sm text-gray-800 leading-relaxed">${mdHtml}</div>
            ${chips}
          </div>
          ${latencyHtml}
        </div>
      </div>`;
    }

    function intakeBubbleHtml(text) {
      return `<div class="flex justify-start mb-4">
        <div class="max-w-[85%]">
          <div class="bg-white border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-3 shadow-sm">
            <div class="text-sm text-gray-800 leading-relaxed">${escapeHtml(text)}</div>
          </div>
        </div>
      </div>`;
    }

    function summaryBubbleHtml(text) {
      return `<div class="flex justify-start mb-2">
        <div class="max-w-[85%]">
          <div class="bg-gray-50 border border-gray-200 rounded-2xl rounded-tl-sm px-4 py-2.5">
            <div class="text-xs text-gray-400 mb-1 font-medium">파악된 상황</div>
            <div class="text-sm text-gray-600 leading-relaxed">${escapeHtml(text)}</div>
          </div>
        </div>
      </div>`;
    }

    // ── 세션 복원 ────────────────────────────────────────────
    async function restoreSession(sid) {
      try {
        const res = await fetch(`/api/chat/${sid}/messages`);
        const messages = await res.json();
        if (!messages.length) return;
        const ob = document.getElementById('onboarding');
        if (ob) ob.style.display = 'none';
        const container = document.getElementById('chat-messages');
        for (let i = 0; i < messages.length; i++) {
          const m = messages[i];
          const div = document.createElement('div');
          if (m.role === 'user') {
            div.innerHTML = userBubbleHtml(m.content);
          } else {
            div.innerHTML = aiBubbleHtml(m.content, null, null);
          }
          container.appendChild(div);
        }
        scrollToBottom();
      } catch (e) {
        console.error('session restore failed', e);
      }
    }

    // ── 세션 초기화 ──────────────────────────────────────────
    async function ensureSession() {
      if (sessionInitialized) return;
      sessionInitialized = true;

      const urlSessionId = window.__INITIAL_SESSION_ID__;
      if (urlSessionId) {
        sessionId = urlSessionId;
        localStorage.setItem(SESSION_KEY, sessionId);
        await restoreSession(sessionId);
        return;
      }
      if (sessionId) {
        if (!location.pathname.includes(sessionId)) {
          history.replaceState({}, '', '/chat/' + sessionId);
        }
        return;
      }
      try {
        const res = await fetch('/chat/new', { method: 'POST' });
        const data = await res.json();
        sessionId = data.session_id;
        localStorage.setItem(SESSION_KEY, sessionId);
        history.replaceState({}, '', '/chat/' + sessionId);
      } catch (e) {
        console.error('session create failed', e);
      }
    }

    // ── 새 상담 ──────────────────────────────────────────────
    document.getElementById('new-chat-btn').addEventListener('click', async () => {
      sessionId = null;
      sessionInitialized = false;
      localStorage.removeItem(SESSION_KEY);
      const msgs = document.getElementById('chat-messages');
      msgs.innerHTML = `
        <div id="onboarding" class="space-y-4">
          <div class="text-center py-6">
            <div class="text-2xl font-bold text-gray-800 mb-1">무엇이 궁금하신가요?</div>
            <div class="text-sm text-gray-500">법령·판례 기반으로 법률 정보를 알려드립니다</div>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
            <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all" data-question="부당해고를 당했을 때 어떻게 해야 하나요?">
              <div class="text-lg mb-1">🏭</div><div class="font-semibold text-sm text-gray-800">노동법</div><div class="text-xs text-gray-500 mt-0.5">부당해고·임금체불·퇴직금</div>
            </button>
            <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all" data-question="이혼 절차와 재산분할은 어떻게 되나요?">
              <div class="text-lg mb-1">👨‍👩‍👧</div><div class="font-semibold text-sm text-gray-800">가족/연인</div><div class="text-xs text-gray-500 mt-0.5">이혼·양육권·재산분할</div>
            </button>
            <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all" data-question="폭행 피해를 입었을 때 고소 방법과 절차는?">
              <div class="text-lg mb-1">👊</div><div class="font-semibold text-sm text-gray-800">폭행</div><div class="text-xs text-gray-500 mt-0.5">고소·정당방위·합의</div>
            </button>
            <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all" data-question="전세 보증금을 돌려받지 못할 때 법적 조치는?">
              <div class="text-lg mb-1">🏠</div><div class="font-semibold text-sm text-gray-800">부동산</div><div class="text-xs text-gray-500 mt-0.5">임대차·보증금·계약분쟁</div>
            </button>
            <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all" data-question="빌려준 돈을 돌려받기 위한 법적 방법은?">
              <div class="text-lg mb-1">💰</div><div class="font-semibold text-sm text-gray-800">채권/사기</div><div class="text-xs text-gray-500 mt-0.5">빌려준 돈·계약위반·사기</div>
            </button>
            <button class="category-card text-left p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:border-blue-300 hover:shadow transition-all" data-question="교통사고 과실비율은 어떻게 결정되나요?">
              <div class="text-lg mb-1">🚗</div><div class="font-semibold text-sm text-gray-800">교통사고</div><div class="text-xs text-gray-500 mt-0.5">과실비율·합의·보험</div>
            </button>
          </div>
        </div>`;
      bindCategoryCards();
      await ensureSession();
    });

    function bindCategoryCards() {
      document.querySelectorAll('.category-card').forEach(btn => {
        btn.addEventListener('click', () => {
          document.getElementById('question-input').value = btn.dataset.question;
          document.getElementById('question-input').focus();
        });
      });
    }
    bindCategoryCards();

    const textarea = document.getElementById('question-input');
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
    });
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        document.getElementById('chat-form').requestSubmit();
      }
    });

    // ── 메시지 전송 ──────────────────────────────────────────
    async function sendQuestion(question) {
      if (streaming || !question.trim()) return;
      await ensureSession();

      const onboarding = document.getElementById('onboarding');
      if (onboarding) onboarding.remove();

      streaming = true;
      document.getElementById('send-btn').disabled = true;
      document.getElementById('question-input').value = '';
      textarea.style.height = 'auto';

      const msgs = document.getElementById('chat-messages');

      // Immediately show user bubble
      msgs.insertAdjacentHTML('beforeend', userBubbleHtml(question));
      scrollToBottom();

      // Show typing indicator bubble
      const typingId = 'typing-' + Date.now();
      msgs.insertAdjacentHTML('beforeend', typingBubbleHtml(typingId));
      scrollToBottom();

      const url = `/chat/stream?session_id=${encodeURIComponent(sessionId)}&question=${encodeURIComponent(question)}&pipeline=qdrant`;

      let currentTypingId = typingId;

      function replaceTyping(html, addNewTyping = false) {
        const tb = document.getElementById(currentTypingId);
        if (tb) {
          const div = document.createElement('div');
          div.innerHTML = html;
          tb.replaceWith(div);
        } else {
          msgs.insertAdjacentHTML('beforeend', html);
        }
        if (addNewTyping) {
          currentTypingId = 'typing-' + Date.now();
          msgs.insertAdjacentHTML('beforeend', typingBubbleHtml(currentTypingId));
        }
        scrollToBottom();
      }

      try {
        const resp = await fetch(url);
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n\n');
          buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let evt;
            try { evt = JSON.parse(line.slice(6)); } catch { continue; }

            if (evt.type === 'ask') {
              replaceTyping(intakeBubbleHtml(evt.reply));

            } else if (evt.type === 'summary') {
              replaceTyping(summaryBubbleHtml(evt.text), true);

            } else if (evt.type === 'done') {
              replaceTyping(aiBubbleHtml(evt.answer, evt.docs, evt.latency));

            } else if (evt.type === 'error') {
              replaceTyping(`<div class="flex justify-start mb-4">
                <div class="bg-red-50 border border-red-200 rounded-2xl px-4 py-3 text-sm text-red-700 max-w-[85%]">
                  오류: ${escapeHtml(evt.message)}
                </div>
              </div>`);
            }
          }
        }
      } catch (e) {
        const tb = document.getElementById(typingId);
        if (tb) tb.remove();
        console.error('SSE error', e);
      } finally {
        streaming = false;
        document.getElementById('send-btn').disabled = false;
      }
    }

    function scrollToBottom() {
      const scroll = document.getElementById('chat-scroll');
      scroll.scrollTop = scroll.scrollHeight;
    }

    document.getElementById('chat-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const q = document.getElementById('question-input').value.trim();
      if (q) sendQuestion(q);
    });

    ensureSession();
  })();
  </script>

</body>
</html>
